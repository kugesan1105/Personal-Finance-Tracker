name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release name'
        required: true
        default: 'Release'

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Create proofs_of_concept.txt if it doesn't exist
      run: |
        mkdir -p src
        touch src/proofs_of_concept.txt

    - name: Run create_release.py
      run: python src/create_release.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-files
        path: src/proofs_of_concept.txt

  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    environment: production  # ← Requires approval
    permissions:
      contents: write

    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: release-files
        path: ./release-files

    - name: Create GitHub Release with Asset
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${{ github.event.inputs.version }}" \
          --title "${{ github.event.inputs.release_name }} ${{ github.event.inputs.version }}" \
          --notes "Release ${{ github.event.inputs.version }}

        This release was created automatically by running create_release.py

        ## Changes
        - Release created with updated proofs of concept file" \
          ./release-files/proofs_of_concept.txt